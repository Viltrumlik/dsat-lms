name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — lint, format, migrations, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Tests run against in-memory SQLite; no Postgres/Redis needed.
      DJANGO_SECRET_KEY: ci-insecure-secret-key
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_DEBUG: "True"
      DATABASE_URL: "sqlite:///ci.sqlite3"
      REDIS_URL: "redis://localhost:6379/0"
      CELERY_TASK_ALWAYS_EAGER: "True"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/development.txt

      - name: Install dependencies
        run: pip install -r requirements/development.txt

      - name: Ruff (lint)
        run: ruff check .

      - name: Black (format check)
        run: black --check .

      - name: Missing migrations check
        run: python manage.py makemigrations --check --dry-run

      - name: Django system check
        run: python manage.py check

      - name: Tests
        run: pytest
