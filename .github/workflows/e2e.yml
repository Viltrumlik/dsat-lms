name: E2E

# Playwright end-to-end suite. Needs BOTH the Django backend (running + seeded)
# and the Next.js frontend, so it lives in its own workflow and triggers on
# changes to either side. The frontend is started by Playwright's webServer
# (playwright.config.ts); the backend is started here as a background process.
on:
  push:
    branches: ["**"]
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/e2e.yml"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright (frontend + backend)
    runs-on: ubuntu-latest
    env:
      # Backend: SQLite + eager Celery, no Redis/Postgres — matches local dev.
      DJANGO_SECRET_KEY: ci-insecure-secret-key
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_DEBUG: "True"
      DATABASE_URL: "sqlite:///e2e.sqlite3"
      CELERY_TASK_ALWAYS_EAGER: "True"
      # Frontend + Playwright point at the local backend.
      E2E_API_URL: http://localhost:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/development.txt

      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements/development.txt

      - name: Migrate + seed backend
        working-directory: backend
        run: |
          python manage.py migrate --noinput
          # seed_demo_exam needs an existing user to own the exam; the CI DB is
          # fresh, so create a superuser first (idempotent).
          python manage.py shell -c "from apps.identity.models import User; User.objects.filter(email='ci@dsat.local').exists() or User.objects.create_superuser(email='ci@dsat.local', password='ci-password-123', first_name='CI', last_name='Bot')"
          python manage.py seed_demo_exam
          python manage.py seed_demo_academy

      - name: Start backend
        working-directory: backend
        run: |
          nohup python manage.py runserver 0.0.0.0:8000 --noreload > backend.log 2>&1 &
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/v1/auth/me/ || true)
            # /auth/me/ is IsAuthenticated → a healthy server returns exactly 401.
            # Anything else (000 = down, 500 = misconfigured) is NOT "up".
            if [ "$code" = "401" ]; then
              echo "Backend up (HTTP $code)"; exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start"; cat backend.log; exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        working-directory: frontend
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

      - name: Upload backend log
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: backend/backend.log
          retention-days: 7
