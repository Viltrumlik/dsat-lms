version: "3.9"

services:
  # ─────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dsat_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dsat_db
      POSTGRES_USER: dsat
      POSTGRES_PASSWORD: dsat
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dsat -d dsat_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────
  # Redis
  # ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dsat_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────
  # Backend (Django)
  # ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: dsat_backend
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────
  # Celery Worker
  # ─────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: dsat_celery_worker
    restart: unless-stopped
    command: celery -A config worker -l info -Q default,analytics,notifications,email
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - backend
      - redis

  # ─────────────────────────────────────
  # Celery Beat (Scheduler)
  # ─────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: dsat_celery_beat
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - backend
      - redis

  # ─────────────────────────────────────
  # Frontend (Next.js)
  # ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: dsat_frontend
    restart: unless-stopped
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  media_data:
